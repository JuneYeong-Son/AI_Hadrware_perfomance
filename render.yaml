# Render.com Blueprint — one-click deploy of the GPU-Perf backend + Postgres.
#
# Deploy: push this repo to GitHub, then on render.com choose
#   "New +" → "Blueprint" → pick this repo. Render reads this file, builds the
#   Docker image, provisions a free Postgres database, and wires the env vars.
#
# After the first deploy, note the service URL (e.g. https://gpu-perf-api.onrender.com)
# and put it in the desktop app's gpuperf.config.json (see packaging/README.md).
services:
  - type: web
    name: gpu-perf-api
    runtime: docker
    dockerfilePath: ./application/backend/Dockerfile
    dockerContext: ./application/backend
    plan: free
    healthCheckPath: /
    envVars:
      # Random 32+ byte signing key, generated once and kept by Render.
      - key: GPUPERF_SECRET_KEY
        generateValue: true
      # Injected from the managed Postgres below.
      - key: GPUPERF_DATABASE_URL
        fromDatabase:
          name: gpu-perf-db
          property: connectionString
      - key: GPUPERF_CORS_ORIGINS
        value: "*"

databases:
  - name: gpu-perf-db
    plan: free
